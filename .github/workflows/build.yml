name: Build
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build backend
        run: |
          cd backend
          pip install -e ".[dev]"
          pyinstaller travel_content_studio.spec --noconfirm
      - name: Build frontend
        run: |
          npm ci
          npm run build
          npm run dist -- --win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build backend
        run: |
          cd backend
          pip install -e ".[dev]"
          pyinstaller travel_content_studio.spec --noconfirm
      - name: Build frontend
        run: |
          npm ci
          npm run build
          npm run dist -- --mac
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: release/*.dmg
